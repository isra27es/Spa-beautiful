<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beauty Spa Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body, html {
            height: 100%;
            width: 100%;
        }

        .container {
            display: flex;
            height: 100vh;
            width: 100%;
        }

        .left-section {
            flex: 1;
            background-image: url('/fondo.jpg'); /* 🔁 Aquí pones tu imagen */
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e7b97f;
            font-size: 3rem;
            font-weight: bold;
            padding-left: 40px;
        }

        .right-section {
            flex: 1;
            background-color: #c48957;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            width: 80%;
            max-width: 400px;
            background-color: transparent;
            padding: 20px;
            color: white;
        }

        .login-box h2 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .login-box p {
            margin-bottom: 20px;
            font-size: 0.95rem;
        }

        form label {
            display: block;
            margin-top: 15px;
            margin-bottom: 5px;
        }

        form input[type="email"],
        form input[type="password"] {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        form a {
            font-size: 0.8rem;
            float: right;
            color: white;
            text-decoration: underline;
        }

        .remember {
            margin: 10px 0;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
        }

        .remember input {
            margin-right: 10px;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background-color: #1a2d2b;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 10px;
            cursor: pointer;
        }

        .login-options {
            display: flex;
            justify-content: space-between;
            margin: 20px 0;
        }

        .google-btn,
        .apple-btn {
            width: 48%;
            padding: 10px;
            border: none;
            border-radius: 5px;
            background-color: white;
            color: black;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .register {
            text-align: center;
            margin-top: 10px;
        }

        .register a {
            color: white;
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-section">
            <div class="branding">
                <h1>BEAUTY<br>SPA</h1>
            </div>
        </div>
        <div class="right-section">
            <div class="login-box">
                <h2>BIENVENIDO DE VUELTA</h2>
                <p>Ingresa tus credenciales para acceder a tu cuenta</p>

                <form>
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="Ingresa tu correo">

                    <label for="password">
                        Contraseña 
                        <a href="#">¿Olvidaste tu contraseña?</a>
                    </label>
                    <input type="password" id="password" placeholder="Ingresa tu contraseña">

                    <div class="remember">
                        <input type="checkbox" id="remember">
                        <label for="remember">Recordarme por 30 días</label>
                    </div>

                    <button type="submit" class="login-btn">Iniciar Sesión</button>

                    <div class="login-options">
                        <button class="google-btn">🔘 Inicia con Google</button>
                        <button class="apple-btn">🔘 Inicia con Apple</button>
                    </div>

                    <div class="register">
                        <p>¿No tienes una cuenta? <a href="#">Regístrate</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
