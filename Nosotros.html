<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Beauty Spa - Accueil</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Georgia', serif;
    }

    body, html {
      height: 100%;
      width: 100%;
    }

    .hero {
      background-image: url('/fondo.jpg'); /* 🔁 Reemplaza con tu imagen */
      background-size: cover;
      background-position: center;
      height: 100vh;
      width: 100%;
      color: #d9a96a;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding: 80px 60px;
    }

    h1 {
      font-size: 4rem;
      font-weight: 500;
      margin-bottom: 20px;
    }

    .slogan {
      font-size: 1.3rem;
      color: white;
      font-style: italic;
      font-weight: bold;
      margin-bottom: 40px;
    }

    .menu {
      display: flex;
      gap: 40px;
      color: white;
      font-size: 1rem;
    }

    .menu a {
      text-decoration: none;
      color: white;
      transition: color 0.3s ease;
    }

    .menu a:hover {
      color: #f0cd9e;
    }
  </style>
</head>
<body>
  <div class="hero">
    <h1>BEAUTY SPA</h1>
    <p class="slogan">ÉLÉGANCE ET BIEN-ÊTRE,<br>À VOTRE PORTÉE.</p>
    <div class="menu">
      <a href="#">Vidéos</a>
      <a href="#">Produits</a>
      <a href="#">Galería</a>
      <a href="#">Nousotros</a>
    </div>
  </div>
</body>
</html>
